_BASE_: "Base-RSparseRCNN.yaml"
MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  RESNETS:
    DEPTH: 50
    STRIDE_IN_1X1: False
  RSparseRCNN:
    NUM_PROPOSALS: 100
    NUM_CLASSES: 1
DATASETS:
  TRAIN: ("NASTaR_train",)
  TEST: ("NASTaR_val",)
SOLVER:
  # NASTaR has ~1925 training images. With batch size 8:
  # 1 epoch ≈ 241 iterations
  # 60 epochs ≈ 14,460 iterations
  # 80 epochs ≈ 19,280 iterations (with LR drops at 60 and 70 epochs)
  IMS_PER_BATCH: 1        # Keep at 1 for CPU to avoid OOM
  MAX_ITER: 2500          # Shortens training from 3 days to ~11 hours
  STEPS: (1800, 2200)     # Decay learning rate at 70% and 90% of training
  BASE_LR: 0.00002        # Standard starting rate
  WARMUP_ITERS: 500       # 20% of total iterations for stability
INPUT:
  MIN_SIZE_TRAIN: (384, 416, 448, 480, 512)
  MIN_SIZE_TEST: 512
  MAX_SIZE_TEST: 512
  CROP:
    ENABLED: False
  FORMAT: "RGB"
TEST:
  EVAL_PERIOD: 2410 # Evaluate every ~10 epochs
